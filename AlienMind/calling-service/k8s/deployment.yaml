apiVersion: apps/v1
kind: Deployment
metadata:
  name: calling-service
  namespace: alienmind
  labels:
    app: calling-service
spec:
  replicas: 3
  selector:
    matchLabels:
      app: calling-service
  template:
    metadata:
      labels:
        app: calling-service
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      containers:
      - name: calling-service
        image: kushalkumar12/alienmind-calling-service:latest
        imagePullPolicy: IfNotPresent
        ports:
        - name: http
          containerPort: 8080
        - name: grpc
          containerPort: 9090
        env:
        - name: HTTP_PORT
          value: "8080"
        - name: GRPC_PORT
          value: "9090"
        - name: REDIS_URL
          value: "redis://redis-master.alienmind.svc.cluster.local:6379"
        - name: LIVEKIT_API_KEY
          value: "devkey"
        - name: LIVEKIT_API_SECRET
          value: "secret"
        - name: LIVEKIT_URL
          value: "https://livekit.alienmind.net"
        - name: WEBHOOK_SHARED_SECRET
          value: "webhook-secret"
        resources:
          limits:
            cpu: "1"
            memory: 1Gi
          requests:
            cpu: "200m"
            memory: 256Mi
        readinessProbe:
          httpGet:
            path: /healthz
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8080
          initialDelaySeconds: 15
          periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: calling-service
  namespace: alienmind
spec:
  ports:
  - name: http
    port: 8080
    targetPort: 8080
  - name: grpc
    port: 9090
    targetPort: 9090
  selector:
    app: calling-service
